name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation des dépendances pour le lint/test
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Linting avec Flake8
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avertissements uniquement
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Exécution des Tests unitaires
        run: |
          cd app
          python -m unittest test_main.py

  build-and-deploy:
    needs: lint-and-test # Assure que le déploiement ne se fait QUE si les tests passent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Build de l'image Docker
        run: |
          docker build -t devops-project-worker:latest .

      - name: Scan de vulnérabilités avec Trivy (Mois 6)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devops-project-worker:latest'
          format: 'table'
          exit-code: '0' # Permet au pipeline de passer tout en affichant les failles
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Simulation du cluster local dans GitHub Actions
      - name: Création du cluster Kind
        uses: helm/kind-action@v1.4.0
        with:
          cluster_name: devops-project-cluster

      - name: Chargement de l'image dans Kind
        run: |
          kind load docker-image devops-project-worker:latest --name devops-project-cluster

      - name: Déploiement sur Kubernetes
        run: |
          # Installation du CRD PodMonitor (car Prometheus n'est pas installé dans le cluster de test CI)
          kubectl apply --server-side -f https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_podmonitors.yaml
          kubectl apply -f k8s/
          # Attente que le déploiement soit validé
          kubectl rollout status deployment/worker --timeout=60s
